<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>FocusUp</title>

  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <h2>🔐 Bem-vindo ao FocusUp</h2>

    <div class="input-group">
      <label>Usuário</label>
      <input id="user" placeholder="Digite seu usuário">
    </div>

    <div class="input-group">
      <label>Senha</label>
      <input id="pass" type="password" placeholder="Digite sua senha">
    </div>

    <button onclick="login()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div class="container">
  <h1>📱 FocusUp</h1>

  <section>
    <h2>📋 Tarefas</h2>
    <input id="taskInput" placeholder="Digite uma tarefa">
    <button onclick="addTask()">Adicionar</button>
    <ul id="taskList"></ul>
  </section>

  <section>
    <h2>⏱️ Timer</h2>
    <div id="timer">25:00</div>
    <button onclick="startTimer()">Iniciar</button>
    <button onclick="resetTimer()">Resetar</button>
  </section>
</div>

<audio id="alarm" src="https://www.soundjay.com/buttons/beep-07.wav"></audio>

<script src="script.js"></script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
